<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Quiz · Dajuang Disaster Prevention Challenge</title>
<meta name="description" content="A 10-question challenge for Dajuang Elementary School's SEA-themed disaster prevention curriculum. Easy English, big font, mobile-friendly.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#2d6aa8;
    --blue-deep:#1c4d7e;
    --blue-soft:#e3eef8;
    --green:#5b9d5b;
    --green-deep:#3d7a3d;
    --green-soft:#e7f3e7;
    --orange:#d97818;
    --orange-deep:#a85a0c;
    --orange-soft:#fce7d0;
    --purple:#7e5fa3;
    --purple-soft:#ece4f4;
    --bg-soft:#f5f8fb;
    --line:#dde6ee;
    --ink:#1f1d1a;
    --ink-soft:#5e6770;
    --red:#c54b3a;
    --red-soft:#fdecea;
    --shadow:0 16px 40px -16px rgba(28,77,126,.30);
    --shadow-sm:0 6px 18px -6px rgba(28,77,126,.20);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{
    min-height:100%;
    background:#ffffff;
    color:var(--ink);
    font-family:'Inter','PingFang TC','Apple LiGothic Medium','Microsoft JhengHei',sans-serif;
    font-size:20px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  @media (min-width:720px){ html,body{ font-size:23px; } }

  .wrap{
    max-width:820px;margin:0 auto;
    padding:32px 22px 60px;
    min-height:100vh;display:flex;flex-direction:column;
  }

  /* ===== Header ===== */
  .head{
    background:var(--blue-deep);color:#fff;border-radius:20px;
    padding:28px 28px;text-align:center;border-bottom:6px solid var(--orange);
    box-shadow:var(--shadow);
  }
  .head__brand{
    font-size:13px;letter-spacing:3px;color:#ffd9b0;
    text-transform:uppercase;font-weight:700;margin-bottom:8px;
  }
  @media (min-width:720px){ .head__brand{ font-size:15px; } }
  .head__title{
    font-family:'Cormorant Garamond',serif;
    font-size:32px;font-weight:700;letter-spacing:.5px;line-height:1.15;
  }
  @media (min-width:720px){ .head__title{ font-size:42px; } }
  .head__sub{
    color:#cbdbe9;font-size:16px;margin-top:8px;font-style:italic;
  }
  @media (min-width:720px){ .head__sub{ font-size:19px; } }

  /* ===== Card ===== */
  .card{
    background:#fff;border-radius:24px;border:1px solid var(--line);
    box-shadow:var(--shadow);padding:34px 30px;margin-top:26px;
    flex:1;display:flex;flex-direction:column;
  }
  @media (min-width:720px){ .card{ padding:48px 44px; } }

  /* ===== Progress ===== */
  .progress{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:20px;
  }
  .progress__no{
    font-family:'Cormorant Garamond',serif;
    font-size:18px;font-weight:700;color:var(--orange-deep);
    letter-spacing:1.5px;
  }
  @media (min-width:720px){ .progress__no{ font-size:22px; } }
  .progress__bar{
    flex:1;margin-left:18px;
    height:8px;background:var(--bg-soft);
    border:1px solid var(--line);border-radius:99px;overflow:hidden;
  }
  @media (min-width:720px){ .progress__bar{ height:10px; } }
  .progress__fill{
    height:100%;background:var(--orange);border-radius:99px;
    transition:width .3s ease;width:0%;
  }

  /* ===== Question ===== */
  .question{
    font-family:'Cormorant Garamond',serif;
    font-size:26px;font-weight:700;color:var(--blue-deep);
    line-height:1.4;margin-top:8px;letter-spacing:.2px;
  }
  @media (min-width:720px){ .question{ font-size:32px; } }
  .question__zh{
    font-size:17px;color:var(--ink-soft);line-height:1.55;
    margin-top:10px;
  }
  @media (min-width:720px){ .question__zh{ font-size:20px; } }

  /* ===== Options ===== */
  .options{
    display:flex;flex-direction:column;gap:14px;margin-top:28px;
  }
  .opt{
    background:#fff;border:2px solid var(--line);border-radius:14px;
    padding:18px 20px;font-size:20px;font-family:inherit;font-weight:600;color:var(--ink);
    text-align:left;cursor:pointer;transition:all .15s;
    display:flex;align-items:center;gap:16px;line-height:1.4;
  }
  @media (min-width:720px){ .opt{ font-size:24px;padding:22px 24px; } }
  .opt:hover:not(:disabled){border-color:var(--orange);background:#fff9f0;transform:translateX(2px);}
  .opt__mark{
    width:42px;height:42px;border-radius:50%;background:var(--blue-soft);color:var(--blue-deep);
    display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;
    font-size:18px;border:2px solid var(--line);
    font-family:'Cormorant Garamond',serif;
  }
  @media (min-width:720px){ .opt__mark{ width:48px;height:48px;font-size:20px; } }
  .opt.is-correct{background:var(--green-soft);border-color:var(--green);color:#2c6b2c;}
  .opt.is-correct .opt__mark{background:var(--green);color:#fff;border-color:var(--green);}
  .opt.is-wrong{background:var(--red-soft);border-color:var(--red);color:#8b2e22;}
  .opt.is-wrong .opt__mark{background:var(--red);color:#fff;border-color:var(--red);}
  .opt:disabled{cursor:default;}

  /* ===== Feedback ===== */
  .feedback{
    margin-top:22px;padding:14px 18px;border-radius:12px;
    font-size:17px;font-weight:600;text-align:center;line-height:1.5;
    min-height:0;opacity:0;transition:opacity .2s;
  }
  @media (min-width:720px){ .feedback{ font-size:20px; } }
  .feedback.show{opacity:1;}
  .feedback--ok{background:var(--green-soft);color:#2c6b2c;border:1.5px solid var(--green);}
  .feedback--ng{background:var(--red-soft);color:#8b2e22;border:1.5px solid var(--red);}

  /* ===== Result ===== */
  .result{ text-align:center; }
  .result__emoji{font-size:72px;line-height:1;}
  @media (min-width:720px){ .result__emoji{ font-size:96px; } }
  .result__title{
    font-family:'Cormorant Garamond',serif;
    font-size:34px;font-weight:700;color:var(--blue-deep);margin-top:14px;letter-spacing:.5px;
  }
  @media (min-width:720px){ .result__title{ font-size:46px; } }
  .result__score{
    font-family:'Cormorant Garamond',serif;
    font-size:64px;font-weight:700;color:var(--orange);margin:18px 0 6px;line-height:1;
  }
  @media (min-width:720px){ .result__score{ font-size:88px; } }
  .result__score small{font-size:28px;color:var(--ink-soft);font-weight:600;font-family:inherit;}
  @media (min-width:720px){ .result__score small{ font-size:36px; } }
  .result__msg{
    font-size:20px;color:var(--ink);line-height:1.6;margin-top:16px;max-width:560px;
    margin-left:auto;margin-right:auto;
  }
  @media (min-width:720px){ .result__msg{ font-size:24px; } }
  .result__zh{font-size:16px;color:var(--ink-soft);margin-top:6px;}
  @media (min-width:720px){ .result__zh{ font-size:18px; } }

  /* ===== Buttons ===== */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:18px 32px;font-size:20px;font-weight:700;font-family:inherit;letter-spacing:.5px;
    border:none;border-radius:14px;cursor:pointer;text-decoration:none;
    transition:transform .15s, box-shadow .15s, background .15s;
  }
  @media (min-width:720px){ .btn{ font-size:22px;padding:20px 36px; } }
  .btn:active{transform:scale(.97);}
  .btn--primary{background:var(--orange);color:#fff;box-shadow:0 6px 18px -6px rgba(217,120,24,.5);}
  .btn--primary:hover{background:var(--orange-deep);}
  .btn--ghost{background:#fff;color:var(--blue-deep);border:2px solid var(--line);}
  .btn--ghost:hover{background:var(--blue-soft);border-color:var(--blue);}

  .result__actions{
    display:flex;flex-direction:column;gap:12px;margin-top:32px;align-items:center;
  }
  @media (min-width:720px){ .result__actions{ flex-direction:row;justify-content:center;gap:16px; } }
  .result__actions .btn{min-width:240px;}

  /* ===== Footer ===== */
  .foot{
    text-align:center;font-size:13px;color:var(--ink-soft);
    font-style:italic;letter-spacing:.5px;margin-top:24px;
  }
  @media (min-width:720px){ .foot{ font-size:15px; } }
  .foot a{color:var(--orange-deep);text-decoration:none;border-bottom:1px solid var(--orange-soft);}
  .foot a:hover{color:var(--orange);}
</style>
</head>
<body>

<div class="wrap">

  <header class="head">
    <div class="head__brand">Dajuang Elementary · Disaster Prevention</div>
    <h1 class="head__title">The SEA Challenge</h1>
    <div class="head__sub">10 easy questions · 共 10 題 · Test what you learned!</div>
  </header>

  <!-- Quiz body -->
  <main class="card" id="quiz-card">
    <div class="progress">
      <div class="progress__no" id="qno">Question 1 / 10</div>
      <div class="progress__bar"><div class="progress__fill" id="bar"></div></div>
    </div>

    <div class="question" id="question">Loading…</div>
    <div class="question__zh" id="question-zh"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </main>

  <!-- Result body (hidden by default) -->
  <main class="card result" id="result-card" style="display:none;">
    <div class="result__emoji" id="r-emoji">🎉</div>
    <div class="result__title" id="r-title">Well done!</div>
    <div class="result__score">
      <span id="r-score">0</span> / <span id="r-total">10</span>
      <small id="r-pct">(0%)</small>
    </div>
    <p class="result__msg" id="r-msg-en">You did great!</p>
    <p class="result__zh" id="r-msg-zh">完成了！</p>
    <div class="result__actions">
      <button class="btn btn--primary" id="btn-restart">Try again · 再試一次</button>
      <a class="btn btn--ghost" href="https://lukelin7429.github.io/changhua-bilingual/schools/dajuang/disaster/">← Back to the page · 回防災頁</a>
    </div>
  </main>

  <div class="foot">
    Dajuang Elementary School · 彰化縣溪州鄉大莊國民小學 &nbsp;·&nbsp;
    <a href="https://lukelin7429.github.io/changhua-bilingual/schools/dajuang/disaster/">View the disaster prevention page · 看防災介紹</a>
  </div>
</div>

<script>
/* =========================================================
   Dajuang Disaster Prevention Challenge — 10 easy questions
   ========================================================= */

const QUIZ = [
  // ---- Three crops, three personas ----
  { q:'At Dajuang, RICE 🌾 stands for which personality?',
    zh:'在大莊，「稻米」🌾 代表哪一種人格？',
    options:['Brave','Humble','Funny','Lazy'], answer:1,
    explain:'Rice = Humble 謙。Stay humble like the rice plant — it bends low when it is full.' },

  { q:'DRAGON FRUIT 🐲 stands for...',
    zh:'「火龍果」🐲 代表？',
    options:['Quiet','Shy','Passionate','Tired'], answer:2,
    explain:'Dragon fruit = Passionate 熱。Bright pink, full of energy, like a child who loves to learn!' },

  { q:'GUAVA 🍐 stands for...',
    zh:'「芭樂」🍐 代表？',
    options:['Smart','Optimistic','Tall','Cold'], answer:1,
    explain:'Guava = Optimistic 樂。Light, green, and full of joy. Stay positive!' },

  // ---- SEA pillars ----
  { q:'In the word "SEA", the letter S means...',
    zh:'SEA 的 S 是什麼意思？',
    options:['School','Shelling','Snack','Sea'], answer:1,
    explain:'S = Shelling 砲擊防災. There is an old artillery site near the school — we tell its story.' },

  { q:'In the word "SEA", the letter E means...',
    zh:'SEA 的 E 是什麼意思？',
    options:['Eating','Easy','Earth','Egg'], answer:0,
    explain:'E = Eating 食農防災. We learn how to cook and save food after a disaster.' },

  { q:'In the word "SEA", the letter A means...',
    zh:'SEA 的 A 是什麼意思？',
    options:['Apple','Animal','Aesthetics','After'], answer:2,
    explain:'A = Aesthetics 美學防災. We use art (dyeing, pottery, blocks) to heal our hearts.' },

  // ---- Local hazard ----
  { q:'Which big river is near Dajuang Elementary School?',
    zh:'大莊國小附近是哪一條大溪？',
    options:['Tamsui River','Yellow River','Zhuoshui River','Hudson River'], answer:2,
    explain:'濁水溪 Zhuoshui River — Taiwan’s longest river. The school is on its north bank.' },

  // ---- Signature space ----
  { q:'The Sheep Pizza Oven 🐑 teaches students how to...',
    zh:'綿羊窯烤爐 🐑 讓學生學什麼？',
    options:['Sleep better','Cook food after a disaster','Drive a car','Play music'], answer:1,
    explain:'Students built it with their own hands. They learn to cook and store food when help is far away.' },

  // ---- Recognition ----
  { q:'Dajuang has been honored by the Ministry of Education for how many years in a row?',
    zh:'大莊國小連續幾年得到教育部肯定？',
    options:['1 year','2 years','4 years','10 years'], answer:2,
    explain:'4 years in a row (2021–2024)! Foundational → Advanced → Co-Innovation → Outreach.' },

  // ---- SDGs ----
  { q:'Which UN goal best matches Dajuang’s disaster lessons?',
    zh:'大莊的防災課最對應哪一個 UN 目標？',
    options:['SDG 5 Equality','SDG 11 Sustainable Cities','SDG 14 Life Below Water','SDG 1 No Poverty'], answer:1,
    explain:'SDG 11 永續城鄉 — building safer towns and stronger communities. We also touch SDG 12 and SDG 17.' },
];

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const state = { idx:0, score:0, answers:[] };

function render(){
  const q = QUIZ[state.idx];
  $('#qno').textContent = `Question ${state.idx + 1} / ${QUIZ.length}`;
  $('#bar').style.width = (state.idx / QUIZ.length * 100) + '%';
  $('#question').textContent = q.q;
  $('#question-zh').textContent = q.zh;
  $('#feedback').textContent = '';
  $('#feedback').className = 'feedback';

  const box = $('#options');
  box.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt__mark">${'ABCD'[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => answer(i, btn));
    box.appendChild(btn);
  });

  $('#question').scrollIntoView({behavior:'smooth', block:'start'});
}

function answer(picked, btn){
  const q = QUIZ[state.idx];
  const ok = picked === q.answer;
  state.answers.push({ q: state.idx, picked, correct: ok });
  if(ok) state.score++;

  $$('#options .opt').forEach((b, i) => {
    b.disabled = true;
    if(i === q.answer) b.classList.add('is-correct');
    if(i === picked && !ok) b.classList.add('is-wrong');
  });

  const fb = $('#feedback');
  fb.classList.add('show');
  fb.classList.add(ok ? 'feedback--ok' : 'feedback--ng');
  fb.innerHTML = ok
    ? `✓ Correct! 答對了！<br><span style="font-weight:500;">${q.explain}</span>`
    : `✗ The answer is: <b>${q.options[q.answer]}</b><br><span style="font-weight:500;">${q.explain}</span>`;

  $('#bar').style.width = ((state.idx + 1) / QUIZ.length * 100) + '%';

  setTimeout(() => {
    state.idx++;
    if(state.idx >= QUIZ.length) finish();
    else render();
  }, 2400);
}

function finish(){
  const total = QUIZ.length;
  const score = state.score;
  const pct = Math.round(score / total * 100);

  $('#r-score').textContent = score;
  $('#r-total').textContent = total;
  $('#r-pct').textContent = `(${pct}%)`;

  let emoji, title, msgEn, msgZh;
  if(pct === 100)      { emoji='🏆'; title='Perfect score!';      msgEn="You're a true SEA Captain — ready to lead the next field trip!"; msgZh='滿分！你已經是 SEA 隊長，可以帶下一團遊學了！'; }
  else if(pct >= 80)   { emoji='🌟'; title='Excellent work!';     msgEn='Great job — you really know Dajuang’s story!';              msgZh='做得很好！你真的懂大莊的故事。'; }
  else if(pct >= 60)   { emoji='🌾'; title='Nice try!';           msgEn='Good effort — scroll through the page once more and you’ll get it.'; msgZh='不錯！回頁面再看一次就更熟了。'; }
  else                 { emoji='🐑'; title='Keep going!';         msgEn="Don't give up — read the page again and the sheep oven is waiting!"; msgZh='不要放棄！再讀一次防災頁，綿羊窯在等你！'; }

  $('#r-emoji').textContent = emoji;
  $('#r-title').textContent = title;
  $('#r-msg-en').textContent = msgEn;
  $('#r-msg-zh').textContent = msgZh;

  $('#quiz-card').style.display = 'none';
  $('#result-card').style.display = 'flex';
  $('#result-card').style.flexDirection = 'column';
  $('#result-card').style.alignItems = 'center';
  $('#result-card').scrollIntoView({behavior:'smooth', block:'start'});
}

$('#btn-restart').addEventListener('click', () => {
  state.idx = 0; state.score = 0; state.answers = [];
  $('#result-card').style.display = 'none';
  $('#quiz-card').style.display = 'flex';
  render();
});

render();
</script>
</body>
</html>
